name = "costrack-mcp"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { ENVIRONMENT = "production" }

[[kv_namespaces]]
binding = "COSTRACK_EVENTS"
id = "<KV_NAMESPACE_ID>"
preview_id = "<KV_PREVIEW_NAMESPACE_ID>"

[[durable_objects.bindings]]
name = "COST_AGGREGATOR"
class_name = "CostAggregator"

[[migrations]]
tag = "v1"
new_classes = ["CostAggregator"]
